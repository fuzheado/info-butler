version: '3.8'

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-butler
    restart: unless-stopped
    command: ["gateway", "run"]
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6g
    ports:
      - "9119:9119" # Exposes Admin Dashboard WebSockets for the Remote Desktop App
    environment:
      # ── Telegram ──
      - TELEGRAM_BOT_TOKEN=your_telegram_bot_token_here
      - TELEGRAM_ALLOWED_USERS=user_id_1,user_id_2
      - TELEGRAM_GROUP_ALLOWED_CHATS=-1001234567890
      # ── Chat model configured via mounted config/config.yaml ──
      # (uses provider: custom, points at Ollama)
      # ── OpenAI key for image generation and tools ──
      # Tools like gpt-image-1-mini call OpenAI directly.
      # Only needed if you want /draw to work.
      - OPENAI_API_KEY=sk-your-real-openai-key-here
      # ── Cloud fallback for heavy reasoning ──
      - GEMINI_API_KEY=your_google_gemini_api_key_here
      # Dashboard disabled — needs auth provider plugin or --insecure flag
      # - HERMES_DASHBOARD=1
    volumes:
      - ./wiki:/opt/data/wiki
      - ./config:/opt/data/config
      - ./config/config.yaml:/opt/data/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  quartz-visualizer:
    image: node:22-alpine
    container_name: quartz-wiki
    restart: unless-stopped
    ports:
      - "8080:8080" # Exposes the browseable, interactive mind-map website
    volumes:
      - ./wiki:/usr/src/app/content # Binds Quartz content directory directly to the folder Hermes edits
    working_dir: /usr/src/app
    command: >
      sh -c "if [ ! -d '.git' ]; then
               apk add --no-cache git &&
               git clone https://github.com/jackyzha0/quartz.git . &&
               npm ci &&
               npx quartz create --action copy --link content;
             fi &&
             npx quartz build --serve --port 8080"
